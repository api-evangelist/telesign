naftiko: 1.0.0-alpha2
info:
  label: Telesign Score API — Fraud Scoring
  description: 'Telesign Score API — Fraud Scoring. 1 operations. Lead operation: Score Phone Number for Fraud Risk. Self-contained
    Naftiko capability covering one Telesign business surface.'
  tags:
  - Telesign
  - Fraud Scoring
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TELESIGN_API_KEY: TELESIGN_API_KEY
capability:
  consumes:
  - type: http
    namespace: score-fraud-scoring
    baseUri: https://rest-ww.telesign.com/v1
    description: Telesign Score API — Fraud Scoring business capability. Self-contained, no shared references.
    resources:
    - name: score-complete_phone_number
      path: /score/{complete_phone_number}
      operations:
      - name: scorephonenumber
        method: POST
        description: Score Phone Number for Fraud Risk
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: complete_phone_number
          in: path
          type: string
          description: The complete phone number including country code, no spaces or special characters.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.TELESIGN_USER}}'
      password: '{{env.TELESIGN_PASS}}'
  exposes:
  - type: rest
    namespace: score-fraud-scoring-rest
    port: 8080
    description: REST adapter for Telesign Score API — Fraud Scoring. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/score/{complete-phone-number}
      name: score-complete-phone-number
      description: REST surface for score-complete_phone_number.
      operations:
      - method: POST
        name: scorephonenumber
        description: Score Phone Number for Fraud Risk
        call: score-fraud-scoring.scorephonenumber
        with:
          complete_phone_number: rest.complete_phone_number
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: score-fraud-scoring-mcp
    port: 9090
    transport: http
    description: MCP adapter for Telesign Score API — Fraud Scoring. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: score-phone-number-fraud-risk
      description: Score Phone Number for Fraud Risk
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: score-fraud-scoring.scorephonenumber
      with:
        complete_phone_number: tools.complete_phone_number
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
