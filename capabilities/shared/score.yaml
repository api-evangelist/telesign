naftiko: "1.0.0-alpha1"

info:
  label: Telesign Score API
  description: >-
    Assess fraud risk for phone numbers using reputation scoring based on intelligence,
    traffic patterns, machine learning, and a global data consortium.
  tags:
    - Fraud Detection
    - Phone Intelligence
    - Risk Scoring
    - Telesign
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TELESIGN_CUSTOMER_ID: TELESIGN_CUSTOMER_ID
      TELESIGN_API_KEY: TELESIGN_API_KEY

capability:
  consumes:
    - type: http
      namespace: telesign-score
      baseUri: https://rest-ww.telesign.com/v1
      description: Telesign phone number reputation and fraud risk scoring service.
      authentication:
        type: basic
        username: "{{TELESIGN_CUSTOMER_ID}}"
        password: "{{TELESIGN_API_KEY}}"
      resources:
        - name: score
          path: /score
          description: Phone number fraud risk scoring
          operations:
            - name: score-phone-number
              method: POST
              description: Score a phone number for fraud risk using multi-dimensional intelligence
              inputParameters:
                - name: complete_phone_number
                  in: path
                  type: string
                  required: true
                  description: Complete phone number including country code
                - name: account_lifecycle_event
                  in: body
                  type: string
                  required: true
                  description: Account lifecycle stage (create, sign-in, transact, update, delete)
                - name: originating_ip
                  in: body
                  type: string
                  required: false
                  description: End user's IP address
                - name: device_id
                  in: body
                  type: string
                  required: false
                  description: End user's device ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: telesign-score-rest
      resources:
        - path: /v1/fraud-scores/{phone_number}
          name: fraud-scores
          description: Score phone numbers for fraud risk
          operations:
            - method: POST
              name: score-phone-number
              description: Get fraud risk score for a phone number
              call: "telesign-score.score-phone-number"
              with:
                complete_phone_number: "rest.phone_number"
                account_lifecycle_event: "rest.account_lifecycle_event"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: telesign-score-mcp
      transport: http
      tools:
        - name: score-phone-for-fraud
          description: Score a phone number for fraud risk using Telesign intelligence
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "telesign-score.score-phone-number"
          with:
            complete_phone_number: "tools.phone_number"
            account_lifecycle_event: "tools.account_lifecycle_event"
          outputParameters:
            - type: object
              mapping: "$."
