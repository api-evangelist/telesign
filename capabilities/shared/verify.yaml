naftiko: "1.0.0-alpha1"

info:
  label: Telesign Verify API
  description: >-
    Multi-channel phone-based verification and MFA. Send OTPs via SMS, voice,
    WhatsApp, Viber, RCS, or email, and verify codes for account security flows.
  tags:
    - Authentication
    - MFA
    - OTP
    - Telesign
    - Verification
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TELESIGN_CUSTOMER_ID: TELESIGN_CUSTOMER_ID
      TELESIGN_API_KEY: TELESIGN_API_KEY

capability:
  consumes:
    - type: http
      namespace: telesign-verify
      baseUri: https://rest-ww.telesign.com/v1
      description: Telesign multi-channel verification and MFA service.
      authentication:
        type: basic
        username: "{{TELESIGN_CUSTOMER_ID}}"
        password: "{{TELESIGN_API_KEY}}"
      resources:
        - name: verify
          path: /verify
          description: Create, retrieve, and update verification processes
          operations:
            - name: create-verification
              method: POST
              description: Send an OTP to a phone number to initiate verification
              inputParameters:
                - name: phone_number
                  in: body
                  type: string
                  required: true
                  description: End user's phone number including country code
                - name: channel
                  in: body
                  type: string
                  required: false
                  description: Delivery channel (sms, voice, whatsapp, viber, rcs, email)
                - name: code_length
                  in: body
                  type: integer
                  required: false
                  description: OTP code length (4-10 digits)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-verification
              method: GET
              description: Check the status of an existing verification process
              inputParameters:
                - name: reference_id
                  in: path
                  type: string
                  required: true
                  description: Reference ID from the create verification response
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-verification
              method: PATCH
              description: Submit the OTP code entered by the end user to complete verification
              inputParameters:
                - name: reference_id
                  in: path
                  type: string
                  required: true
                  description: Reference ID of the verification to update
                - name: verify_code
                  in: body
                  type: string
                  required: true
                  description: OTP code entered by the end user
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: telesign-verify-rest
      resources:
        - path: /v1/verifications
          name: verifications
          description: Create verification processes
          operations:
            - method: POST
              name: create-verification
              description: Send OTP to initiate a verification flow
              call: "telesign-verify.create-verification"
              with:
                phone_number: "rest.phone_number"
                channel: "rest.channel"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/verifications/{reference_id}
          name: verification
          description: Get or update a verification process
          operations:
            - method: GET
              name: get-verification
              description: Get verification status
              call: "telesign-verify.get-verification"
              with:
                reference_id: "rest.reference_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: update-verification
              description: Submit OTP code to complete verification
              call: "telesign-verify.update-verification"
              with:
                reference_id: "rest.reference_id"
                verify_code: "rest.verify_code"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: telesign-verify-mcp
      transport: http
      tools:
        - name: create-verification
          description: Send an OTP to a phone number to start a verification flow
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "telesign-verify.create-verification"
          with:
            phone_number: "tools.phone_number"
            channel: "tools.channel"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-verification-status
          description: Check the status of a verification process
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "telesign-verify.get-verification"
          with:
            reference_id: "tools.reference_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: complete-verification
          description: Submit OTP code entered by user to complete verification
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "telesign-verify.update-verification"
          with:
            reference_id: "tools.reference_id"
            verify_code: "tools.verify_code"
          outputParameters:
            - type: object
              mapping: "$."
