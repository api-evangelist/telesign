specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Telesign
providerId: telesign
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Communications
  - SMS
  - Phone Intelligence
  - Verification
description: >-
  FOCUS-aligned FinOps for Telesign: pay-as-you-go per-message and per-request charges with destination-country
  pricing for SMS/Voice and per-lookup pricing for PhoneID, Score, and Verify, plus negotiated volume packaging.
sources:
  - https://www.telesign.com/pricing
  - https://www.telesign.com/pricing/sms
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Telesign Corporation
serviceCategory: Communications
billingModel:
  pricingCategory: Pay-As-You-Go
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Credit
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Telesign
  ServiceCategory: Communications
  ProviderName: Telesign
  PublisherName: Telesign Corporation
  InvoiceIssuerName: Telesign Corporation
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: sms_messages
    unit: request
    aggregation: sum
    dimensions:
      - destination_country
      - sender_id
      - message_class
  - name: voice_calls
    unit: request
    aggregation: sum
    dimensions:
      - destination_country
      - call_type
  - name: phoneid_lookups
    unit: request
    aggregation: sum
    dimensions:
      - product_variant
      - country
  - name: score_requests
    unit: request
    aggregation: sum
    dimensions:
      - product_variant
      - country
  - name: verify_requests
    unit: request
    aggregation: sum
    dimensions:
      - channel
      - country
  - name: trial_credits_consumed
    unit: request
    aggregation: sum
    dimensions:
      - product
principles:
  - name: Visibility
    description: Use the Telesign customer portal usage and transactions exports to attribute consumption
      by API and destination country at near-real-time granularity.
  - name: Allocation
    description: Tag traffic via separate API keys / sub-accounts per consuming team or product line so
      Telesign invoice line items can be split for chargeback.
  - name: Optimization
    description: Lower SMS spend by routing OTP traffic through Verify (which can fall back to lower-cost
      channels), caching PhoneID lookups for the documented validity window, and negotiating committed-use
      packaging once monthly volume stabilizes.
  - name: Accountability
    description: Assign a budget owner per Telesign sub-account and review high-cost destination countries
      and Verify fallback rates monthly with the account manager.
maintainers:
