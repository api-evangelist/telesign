specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Telesign
providerId: telesign
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Communications
  - Fraud Prevention
  - Phone Intelligence
  - SMS
  - Verification
description: >-
  Telesign uses pay-as-you-go pricing with no contracts, time-based commitments, or monthly fees;
  per-message and per-request rates are quoted by destination country and are not published as a flat
  rate card on the public pricing page. New developers can sign up for a self-serve trial that includes
  complimentary test credits for SMS, SMS Verify, and Verify Plus. Volume customers negotiate preferred
  pricing and committed-use packaging through Telesign sales.
sources:
  - https://www.telesign.com/pricing
  - https://www.telesign.com/pricing/sms
  - https://portal.telesign.com/signup
plans:
  - id: telesign-trial
    name: Free Trial
    type: freemium
    description: Self-serve developer trial with complimentary test credits and no credit card required.
    entries:
      - label: Trial Credits
        name: trial_credits
        type: quota
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: SMS API
      - name: SMS Verify API
      - name: Verify Plus API
      - name: Sandbox / Portal Access
  - id: telesign-pay-as-you-go
    name: Pay-As-You-Go
    type: usage-based
    description: Per-message / per-request pricing varies by destination country; no monthly commitment.
    entries:
      - label: SMS Message
        name: sms_message
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: varies-by-country
        unit: 1
        price: see https://www.telesign.com/pricing/sms
        userMultiplied: false
      - label: Voice Call
        name: voice_call
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: varies-by-country
        unit: 1
        price: see https://www.telesign.com/pricing
        userMultiplied: false
      - label: PhoneID Lookup
        name: phoneid_lookup
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see https://www.telesign.com/pricing
        userMultiplied: false
      - label: Score Request
        name: score_request
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see https://www.telesign.com/pricing
        userMultiplied: false
      - label: Verify Request
        name: verify_request
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see https://www.telesign.com/pricing
        userMultiplied: false
    elements:
      - name: SMS API
      - name: Voice API
      - name: PhoneID API
      - name: Score API
      - name: Verify API
  - id: telesign-volume
    name: Volume / Committed Use
    type: enterprise
    description: Preferred pricing and tailored packaging for volume and committed-use customers, negotiated with sales.
    entries:
      - label: Negotiated Volume
        name: negotiated_volume
        type: tiered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: All Telesign APIs
      - name: Volume Discounts
      - name: Committed-Use Packaging
      - name: Sales-Negotiated SLA
maintainers:
