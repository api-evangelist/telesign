specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Telesign
providerId: telesign
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Communications
  - SMS
  - Phone Intelligence
  - Verification
description: >-
  Telesign does not publish a single canonical rate-limits page on its public developer portal; throttling
  and per-account TPS are typically established at account provisioning and adjusted by Telesign support.
  Reconciliation pending — production limits should be confirmed with the account team or via the customer
  portal before any consumer relies on specific numbers.
sources:
  - https://developer.telesign.com/
  - https://www.telesign.com/contact-sales
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Account TPS
    scope: account
    metric: varies
    limit: see Telesign account team / portal
    notes: >-
      Steady-state TPS is provisioned per Telesign customer account; not published as a fixed default.
policies:
  - name: Backoff
    description: Clients should implement exponential backoff with jitter on 429/503 responses and avoid
      tight retry loops.
  - name: Capacity Adjustments
    description: Higher TPS or burst is requested through Telesign customer support / account management.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
